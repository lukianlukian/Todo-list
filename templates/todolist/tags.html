{% extends "base.html" %}

{% block content %}
  <h1>
    Tags
    <a href="{% url 'todolist:tag-create' %}" class="btn btn-primary link-to-page">
      Add
    </a>
  </h1>
  {% if tags %}
    <table class="table">
      <tr>
        <th>Name</th>
        <th>Update</th>
        <th>Delete</th>
      </tr>

      {% for tag in tags %}
        <tr>
          <td>
              {{ tag.name }}
          </td>
          <td>
              <a type="button" class="btn btn-secondary" href="{% url 'todolist:tag-update' pk=tag.id %}">
                Update
              </a>
            </td>
            <td>
              <a type="button" class="btn btn-danger"
                href="{% url 'todolist:tag-delete' pk=tag.id %}">
                Delete
              </a>
            </td>
        </tr>
      {% endfor %}
    </table>

  {% else %}
      <p>There are no tags yet.</p>
  {% endif %}
{% endblock %}
